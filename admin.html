<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin View — Kochi Route</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@400;500&display=swap"
        rel="stylesheet" />

    <style>
        :root {
            --blue: #1a73e8;
            --dark: #080c14;
            --card: #0e1520;
            --border: #1a2540;
            --muted: #3d5278;
            --text: #e8eeff;
            --green: #00c853;
            --orange: #ff9100;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--dark);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ── Header ── */
        header {
            background: var(--card);
            border-bottom: 1px solid var(--border);
            padding: 14px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 999;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo {
            width: 36px;
            height: 36px;
            background: var(--blue);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .header-title {
            font-family: 'Syne', sans-serif;
            font-size: 16px;
            font-weight: 700;
        }

        .header-sub {
            font-size: 11px;
            color: var(--muted);
            margin-top: 1px;
        }

        /* Driver status badge */
        #driverBadge {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            background: var(--border);
            color: var(--muted);
            transition: all 0.3s;
        }

        #driverBadge.online {
            background: rgba(0, 200, 83, 0.15);
            color: var(--green);
        }

        #driverBadge.online .dot {
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
            animation: pulse 1.5s infinite;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--muted);
            transition: all 0.3s;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }

            50% {
                opacity: 0.6;
                transform: scale(1.3);
            }
        }

        /* ── Map ── */
        #map {
            flex: 1;
            width: 100%;
        }

        /* ── Info Panel (floats over map) ── */
        #infoPanel {
            position: absolute;
            top: 70px;
            left: 16px;
            z-index: 1000;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 16px;
            width: 260px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .panel-title {
            font-family: 'Syne', sans-serif;
            font-size: 11px;
            font-weight: 700;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
        }

        .info-row:last-of-type {
            border-bottom: none;
        }

        .info-label {
            font-size: 12px;
            color: var(--muted);
        }

        .info-value {
            font-family: 'Syne', sans-serif;
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
        }

        .info-value.green {
            color: var(--green);
        }

        .info-value.orange {
            color: var(--orange);
        }

        .info-value.blue {
            color: #6ea8fe;
        }

        /* Destination input section */
        .dest-section {
            margin-top: 14px;
        }

        .dest-label {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 6px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .dest-input-row {
            display: flex;
            gap: 6px;
            position: relative;
        }

        .dest-input-row input {
            flex: 1;
            padding: 9px 12px;
            background: var(--dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 13px;
            outline: none;
            font-family: 'DM Sans', sans-serif;
            min-width: 0;
            transition: border 0.2s;
        }

        .dest-input-row input:focus {
            border-color: var(--blue);
        }

        .dest-input-row input::placeholder {
            color: var(--muted);
        }

        .dest-suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 40px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            margin-top: 4px;
            max-height: 160px;
            overflow-y: auto;
            display: none;
            z-index: 3000;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .dest-suggestions div {
            padding: 9px 12px;
            font-size: 12px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            line-height: 1.4;
            color: var(--text);
        }

        .dest-suggestions div:last-child {
            border-bottom: none;
        }

        .dest-suggestions div:hover {
            background: var(--border);
        }

        .dest-suggestions .no-results {
            color: var(--muted);
            cursor: default;
            font-style: italic;
        }

        .route-btn {
            padding: 9px 12px;
            background: var(--blue);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .route-btn:hover {
            background: #1558b0;
        }

        .route-btn:disabled {
            background: var(--border);
            cursor: not-allowed;
        }

        /* Route summary */
        #routeSummary {
            display: none;
            margin-top: 10px;
            background: var(--dark);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 4px;
        }

        .summary-row:last-child {
            margin-bottom: 0;
        }

        .summary-label {
            color: var(--muted);
        }

        .summary-value {
            font-weight: 600;
            color: var(--text);
        }

        /* Waiting state */
        #waitingMsg {
            text-align: center;
            padding: 20px 0;
            color: var(--muted);
            font-size: 13px;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        /* Status bar */
        #statusBar {
            display: none;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            white-space: nowrap;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <header>
        <div class="header-left">
            <div class="logo">🖥️</div>
            <div>
                <div class="header-title">Admin View</div>
                <div class="header-sub">Live Driver Tracker</div>
            </div>
        </div>
        <div id="driverBadge">
            <div class="dot"></div>
            <span id="driverStatus">Waiting for driver...</span>
        </div>
    </header>

    <!-- Floating Info Panel -->
    <div id="infoPanel">
        <div class="panel-title">📡 Live Driver Info</div>

        <div id="waitingMsg">
            <div class="spinner"></div><br />
            Waiting for driver to go online...
        </div>

        <div id="liveInfo" style="display:none">
            <div class="info-row">
                <span class="info-label">📍 Latitude</span>
                <span class="info-value blue" id="infoLat">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">📍 Longitude</span>
                <span class="info-value blue" id="infoLng">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">🎯 Accuracy</span>
                <span class="info-value green" id="infoAcc">—</span>
            </div>
            <div class="info-row">
                <span class="info-label">🕐 Last Update</span>
                <span class="info-value" id="infoTime">—</span>
            </div>
        </div>

        <!-- Destination picker -->
        <div class="dest-section">
            <span class="dest-label">🏁 Set Destination</span>
            <div class="dest-input-row">
                <input type="text" id="destInput" placeholder="Enter destination..." autocomplete="off" />
                <button class="route-btn" id="routeBtn">Go</button>
                <div class="dest-suggestions" id="destSuggestions"></div>
            </div>
            <div id="routeSummary">
                <div class="summary-row">
                    <span class="summary-label">📏 Distance</span>
                    <span class="summary-value" id="routeDist">—</span>
                </div>
                <div class="summary-row">
                    <span class="summary-label">⏱️ ETA</span>
                    <span class="summary-value" id="routeETA">—</span>
                </div>
            </div>
        </div>
    </div>

    <div id="statusBar"></div>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, onValue } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        // ════════════════════════════════════════════════════════════
        // FIREBASE
        // ════════════════════════════════════════════════════════════

        const firebaseConfig = {
            databaseURL: 'https://kochi-route-poc-default-rtdb.asia-southeast1.firebasedatabase.app'
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);


        // ════════════════════════════════════════════════════════════
        // CONSTANTS
        // ════════════════════════════════════════════════════════════

        const KOCHI_CENTER = [9.9312, 76.2673];
        const OSRM_BASE = 'http://localhost:5000';
        const PHOTON_BASE = 'https://photon.komoot.io';
        const API_TIMEOUT_MS = 10000;


        // ════════════════════════════════════════════════════════════
        // MAP SETUP
        // ════════════════════════════════════════════════════════════

        const map = L.map('map').setView(KOCHI_CENTER, 14);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap contributors'
        }).addTo(map);

        // Driver marker — green pulsing dot
        const driverIcon = L.divIcon({
            className: '',
            html: `<div style="
        width:20px; height:20px;
        background:#00c853;
        border:3px solid white;
        border-radius:50%;
        box-shadow:0 0 16px #00c853;
      "></div>`,
            iconSize: [20, 20],
            iconAnchor: [10, 10]
        });

        // Destination marker — blue
        const destIcon = new L.Icon({
            iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-blue.png',
            shadowUrl: 'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png',
            iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34]
        });


        // ════════════════════════════════════════════════════════════
        // DOM CACHE
        // ════════════════════════════════════════════════════════════

        const DOM = {
            driverBadge: document.getElementById('driverBadge'),
            driverStatus: document.getElementById('driverStatus'),
            waitingMsg: document.getElementById('waitingMsg'),
            liveInfo: document.getElementById('liveInfo'),
            infoLat: document.getElementById('infoLat'),
            infoLng: document.getElementById('infoLng'),
            infoAcc: document.getElementById('infoAcc'),
            infoTime: document.getElementById('infoTime'),
            destInput: document.getElementById('destInput'),
            destSuggestions: document.getElementById('destSuggestions'),
            routeBtn: document.getElementById('routeBtn'),
            routeSummary: document.getElementById('routeSummary'),
            routeDist: document.getElementById('routeDist'),
            routeETA: document.getElementById('routeETA'),
            statusBar: document.getElementById('statusBar'),
        };


        // ════════════════════════════════════════════════════════════
        // STATE
        // ════════════════════════════════════════════════════════════

        let driverMarker = null;
        let destMarker = null;
        let routeLine = null;
        let driverCoords = null;
        let destCoords = null;
        let isDriverOnline = false;


        // ════════════════════════════════════════════════════════════
        // NETWORK HELPERS
        // ════════════════════════════════════════════════════════════

        async function fetchWithTimeout(url, ms = API_TIMEOUT_MS) {
            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), ms);
            try {
                const res = await fetch(url, { signal: controller.signal });
                if (!res.ok) throw new Error(`Server error: ${res.status}`);
                return await res.json();
            } catch (err) {
                if (err.name === 'AbortError') throw new Error('Request timed out.');
                throw err;
            } finally {
                clearTimeout(timer);
            }
        }


        // ════════════════════════════════════════════════════════════
        // FIREBASE LISTENER — watches driver location in real time
        // ════════════════════════════════════════════════════════════

        onValue(ref(db, 'driver/location'), (snapshot) => {
            const data = snapshot.val();

            if (!data) {
                // Driver went offline
                isDriverOnline = false;
                DOM.driverBadge.classList.remove('online');
                DOM.driverStatus.textContent = 'Driver offline';
                DOM.waitingMsg.style.display = 'block';
                DOM.liveInfo.style.display = 'none';
                return;
            }

            const { lat, lng, accuracy, timestamp } = data;
            isDriverOnline = true;
            driverCoords = [lat, lng];

            // Update badge
            DOM.driverBadge.classList.add('online');
            DOM.driverStatus.textContent = 'Driver online';

            // Update info panel
            DOM.waitingMsg.style.display = 'none';
            DOM.liveInfo.style.display = 'block';
            DOM.infoLat.textContent = lat.toFixed(5);
            DOM.infoLng.textContent = lng.toFixed(5);
            DOM.infoAcc.textContent = `${Math.round(accuracy)}m`;
            DOM.infoTime.textContent = new Date(timestamp).toLocaleTimeString();

            // Update driver marker on map
            if (driverMarker) {
                driverMarker.setLatLng([lat, lng]);
            } else {
                driverMarker = L.marker([lat, lng], { icon: driverIcon })
                    .addTo(map)
                    .bindPopup('🚗 Driver');
                map.setView([lat, lng], 15);
            }

            // Auto recalculate route if destination is set
            if (destCoords) {
                calculateRoute(driverCoords, destCoords);
            }
        });


        // ════════════════════════════════════════════════════════════
        // ROUTE CALCULATION
        // ════════════════════════════════════════════════════════════

        async function calculateRoute(start, end) {
            try {
                const url = `${OSRM_BASE}/route/v1/driving/${start[1]},${start[0]};${end[1]},${end[0]}?overview=full&geometries=geojson`;
                const data = await fetchWithTimeout(url);

                if (data.code !== 'Ok' || !data.routes?.length) return;

                const route = data.routes[0];
                const latlngs = route.geometry.coordinates.map(([lng, lat]) => [lat, lng]);

                // Remove old route
                if (routeLine) map.removeLayer(routeLine);

                routeLine = L.polyline(latlngs, {
                    color: '#1a73e8', weight: 5, opacity: 0.8, lineJoin: 'round'
                }).addTo(map);

                // Update summary
                DOM.routeDist.textContent = formatDistance(route.distance);
                DOM.routeETA.textContent = formatDuration(route.duration);
                DOM.routeSummary.style.display = 'block';

            } catch (err) {
                showStatus('⚠️ Route update failed — ' + err.message);
            }
        }


        // ════════════════════════════════════════════════════════════
        // GEOCODING — for destination search
        // ════════════════════════════════════════════════════════════

        async function searchPlace(query) {
            try {
                const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5&countrycodes=in&accept-language=en`;
                const data = await fetchWithTimeout(url);
                return data || [];
            } catch {
                try {
                    const url = `${PHOTON_BASE}/api/?q=${encodeURIComponent(query)}&lat=${KOCHI_CENTER[0]}&lon=${KOCHI_CENTER[1]}&limit=5`;
                    const data = await fetchWithTimeout(url);
                    return (data.features || []).map(f => ({
                        display_name: f.properties.name,
                        lat: f.geometry.coordinates[1],
                        lon: f.geometry.coordinates[0]
                    }));
                } catch {
                    return [];
                }
            }
        }


        // ════════════════════════════════════════════════════════════
        // DESTINATION SEARCH
        // ════════════════════════════════════════════════════════════

        function debounce(fn, delay) {
            let timer;
            return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), delay); };
        }

        DOM.destInput.addEventListener('input', debounce(async (e) => {
            const query = e.target.value.trim();
            DOM.destSuggestions.innerHTML = '';

            if (query.length < 3) { DOM.destSuggestions.style.display = 'none'; return; }

            const results = await searchPlace(query);
            if (!results.length) { DOM.destSuggestions.style.display = 'none'; return; }

            DOM.destSuggestions.style.display = 'block';
            const fragment = document.createDocumentFragment();

            results.forEach(item => {
                const div = document.createElement('div');
                const name = item.display_name?.split(',')[0] || item.display_name;
                div.textContent = item.display_name;

                div.addEventListener('mousedown', (e) => {
                    e.preventDefault();
                    DOM.destInput.value = item.display_name;
                    destCoords = [parseFloat(item.lat), parseFloat(item.lon)];
                    DOM.destSuggestions.style.display = 'none';

                    // Place destination marker
                    if (destMarker) map.removeLayer(destMarker);
                    destMarker = L.marker(destCoords, { icon: destIcon })
                        .addTo(map).bindPopup('🏁 Destination').openPopup();

                    // Calculate route if driver is online
                    if (driverCoords) calculateRoute(driverCoords, destCoords);
                });

                fragment.appendChild(div);
            });

            DOM.destSuggestions.appendChild(fragment);
        }, 300));

        // Hide suggestions on outside click
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.dest-input-row')) {
                DOM.destSuggestions.style.display = 'none';
            }
        });

        // Route button
        DOM.routeBtn.addEventListener('click', () => {
            if (!driverCoords) { showStatus('⚠️ Driver is not online yet.'); return; }
            if (!destCoords) { showStatus('⚠️ Please select a destination.'); return; }
            calculateRoute(driverCoords, destCoords);
        });


        // ════════════════════════════════════════════════════════════
        // FORMAT HELPERS
        // ════════════════════════════════════════════════════════════

        function formatDistance(m) {
            return m >= 1000 ? `${(m / 1000).toFixed(1)} km` : `${Math.round(m)} m`;
        }

        function formatDuration(s) {
            const hrs = Math.floor(s / 3600);
            const mins = Math.floor((s % 3600) / 60);
            if (hrs > 0) return `${hrs} hr ${mins} min`;
            return mins > 0 ? `${mins} min` : 'Less than a minute';
        }


        // ════════════════════════════════════════════════════════════
        // STATUS BAR
        // ════════════════════════════════════════════════════════════

        let statusTimer = null;

        function showStatus(msg, ms = 3000) {
            DOM.statusBar.textContent = msg;
            DOM.statusBar.style.display = 'block';
            if (statusTimer) clearTimeout(statusTimer);
            statusTimer = setTimeout(() => { DOM.statusBar.style.display = 'none'; }, ms);
        }

    </script>
</body>

</html>
